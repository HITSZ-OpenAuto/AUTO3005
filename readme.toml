[[sections]]
title = "教材与在线资源"

[[sections.items]]
content = """
- **A Mathematical Introduction to Robotic Manipulation**（Richard M. Murray, Zexiang Li, S. Shankar Sastry / CRC Press / 1st Edition (1994) / textbook）
- **Introduction to Robotics, Mechanics and Control**（John J. Craig / Addison Wesley Longman / 3rd edition / 参考书）
- **Modern Robotics: Mechanics, Planning, and Control**（Lynch, Kevin M. and Frank Chongwoo Park / 2017 / 参考书）
- **机器人学：建模、控制与视觉**（熊有伦 / 华中科技大学出版社 / 2018 / 参考书）

- [UC Berkeley EE106A 课程主页](https://ucb-ee106.github.io/eecs106a-fa23site/)：注意其中的 discussion 模块，有助教讲解一些疑难问题的板书。
- [台大林沛群教授的机器人学网课视频](https://www.bilibili.com/video/BV1v4411H7ez/)：关于旋转矩阵的理解讲解很到位。但请注意：该课程使用 DH 参数体系，与本课程（基于矩阵指数/旋量）的知识体系不太相符，正逆运动学解法不同，后期帮助可能有限。
"""

[[sections]]
title = "课程内容"

[[sections.items]]
content = """
### 1. 理论教学课程大纲

| 序号 | 教学内容 | 教学要求 | 学时 |
| :---: | :--- | :--- | :---: |
| 1 | 引言；机器人历史 | 1. 了解机器人与自动化的发展概况；<br>2. 了解机器人的应用范围；<br>3. 了解机器人学的研究方向；<br>4. 了解工业机器人的设计、控制与编程。 | 2 |
| 2 | 机器人机构 | 1. 了解操作臂的坐标形式与外形结构；<br>2. 了解手腕的传动与结构；<br>3. 了解手爪的型式和机构；<br>4. 了解机器人结构的基本要求；<br>5. 了解工业机器人的示教编程。 | 1 |
| 3 | **刚体的旋转和平移运动描述** | 1. 掌握刚体变换的定义和性质；<br>2. 掌握刚体的旋转运动和平移运动描述。 | 1 |
| 4 | **三维空间的刚体运动** | 1. 掌握刚体运动的齐次变换法；<br>2. 掌握刚体运动的指数坐标方法；<br>3. 掌握刚体运动的螺旋几何解释；<br>4. 掌握刚体运动的其他参数化方法（如 Euler Angles 和 Fixed Angles）。 | 3 |
| 5 | **刚体的速度描述** | 1. 掌握旋转速度描述；<br>2. 掌握刚体速度的描述；<br>3. 掌握螺旋运动的速度；<br>4. 掌握坐标变换。 | 2 |
| 6 | **机器人操作臂的前向运动学** | 1. 了解机器人运动学的概念；<br>2. 掌握机器人前向运动学问题；<br>3. 掌握机器人前向运动学的指数积解法；<br>4. 掌握机器人操作臂的参数化方法、工作空间定义和计算。 | 2 |
| 7 | **机器人操作臂的逆向运动学** | 1. 了解逆向运动学的概念；<br>2. 掌握 Padan-Kahan 子问题及求解；<br>3. 利用子问题求解逆向运动学问题；<br>4. 逆向运动学问题的一般解法。 | 3 |
| 8 | **机器人的微分运动与雅克比** | 1. 掌握机器人末端的速度分析；<br>2. 掌握机器人末端的力分析；<br>3. 掌握机器人雅克比矩阵的定义与性质；<br>4. 掌握机器人的奇异性和可操作性。 | 3 |
| 9 | **机器人的轨迹规划** | 1. 了解路径的描述和生成的考虑因素；<br>2. 掌握关节空间的轨迹规划方法（重点：LFPB、Cubic，了解 double S 和 Quintic）；<br>3. 掌握任务空间的轨迹规划方法；<br>4. 任务空间轨迹规划的几何问题。 | 4 |
| 10 | 机器人动力学 | 1. 拉格朗日方程；<br>2. 开链操作臂的动力学（主要了解即可，不考试）。 | 3 |
| 11 | 机器人控制基础 | 1. 介绍 computed torque、PD 控制。了解即可，作业有仿真，不考试。<br>（注：对于机械臂控制，大四有一门研究生课[《非线性与自适应控制》](https://hoa.moe/docs/senior-autumn/auto5005/)会涉及其内容。） | 2 |
| 12 | 复习与作业讲解 | 1. 助教进行作业讲解；<br>2. 公布课程设计题目。 | 2 |

### 2. 实验教学大纲

| 序号 | 教学内容 | 教学要求 | 学时 |
| :---: | :--- | :--- | :---: |
| 1 | 实验1：工业机器人的示教编程与焊接实验 | 1. 认知商用工业机器人系统，通过示教器编程完成工业机器人的基本运动；<br>2. 通过示教再现，完成用机器人焊接小纪念品的实验。 | 2 |
| 2 | 实验2：SCARA/并联/六轴机器人的运动学实验 | 1. 了解机器人的开放式控制系统；<br>2. 求解 SCARA 机器人/并联机器人/六轴机器人的前向运动学问题；<br>3. 通过编程完成 SCARA 机器人/并联机器人/六轴机器人的运动学控制。 | 2 |
| 3 | 实验3：正逆运动学实验 | 1. 利用 MATLAB 求解六轴机器人的逆运动学问题，并做仿真；<br>2. （可选）在六轴机器人进行实际验证。 | 2 |
| 4 | 实验4：机器人运动规划与控制 | 1. 基于 SCARA、并联机器人和六轴机器人之一，完成机器人的基本运动规划，并做仿真；<br>2. 将上述运动规划应用于所选机器人进行实机实验，分析结果。 | 2 |

### 3. 列进大纲但未讲授部分

| 序号 | 教学内容 | 教学要求 | 学时 |
| :---: | :--- | :--- | :---: |
| 1 | 机器人的 DH 参数 | 1. 了解 DH 参数的定义；<br>2. 掌握 DH 坐标系及参数表的建立；<br>3. 掌握 DH 参数前向运动学的一般解法；<br>4. 了解 DH 参数逆运动学的一般解法。 | 2 |
"""
