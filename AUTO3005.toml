[[lab]]
content = """
实验1 工业机器人的示教编程与焊接实验:
1. 认知商用工业机器人系统，通过示教器编程完成工业机器人的基本运动；
2. 通过示教再现，完成用机器人焊接小纪念品的实验。
实验2 SCARA/并联机器人/六轴机器人的运动学实验:
1. 了解机器人的开放式控制系统；
2. 求解SCARA机器人/并联机器人/六轴机器人的前向运动学问题；
3. 通过编程完成SCARA机器人/并联机器人/六轴机器人的运动学控制。
实验3 正逆运动学实验:
1. 利用MATLAB求解六轴机器人的逆运动学问题，并做仿真；
2. （可选）在六轴机器人进行实际验证。
实验4 机器人运动规划与控制:
1. 基于SCARA、并联机器人和六轴机器人之一，完成机器人的基本运动规划，并做仿真；
2. 将上述运动规划应用于所选机器人进行实机实验，分析结果。
"""
author = { name = "", link = "", date = "" }

