[[course]]
content = """理论课内容包括：引言、机器人机构、刚体的旋转和平移运动描述、三维空间的刚体运动、刚体的速度描述、机器人操作臂的前向/逆向运动学、机器人的微分运动与雅克比、机器人的轨迹规划、机器人动力学、机器人控制基础。
重点主题：刚体的旋转和平移运动描述、三维空间的刚体运动、刚体的速度描述、机器人操作臂的前向/逆向运动学、机器人的微分运动与雅克比、机器人的轨迹规划。
机器人动力学和机器人控制基础部分不考试。
教学大纲中的DH参数部分没有讲。"""
author = { name = "", link = "", date = "" }

[[exam]]
content = """可携带一张 A4 纸，所以不用背诵所有公式。
计算量较大，对于某些算不出来的矩阵指数，可以先列式，有时间再计算。"""
author = { name = "", link = "", date = "" }

